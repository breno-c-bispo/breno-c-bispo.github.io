    Projects:
      - name: Graph Signal Processing — Theoretical Contributions and Application Scenarios
        summary: "Develops tools that generalise classical signal processing concepts to signals defined over graph-structured domains — including sensor networks, brain activity, and digital images — in a cooperative network involving Brazilian and international universities."
        start_date: 2024
        end_date: present
        highlights:
          - "PI: Prof. Juliano B. Lima (UFPE)"
          - "Status: ongoing"
      
      - name: "TSP-ARK — Topological Signal Processing: Applications in bRain and Knowledge Networks"
        summary: "Develops novel topological signal processing frameworks — leveraging Hodge Laplacians, cross-Laplacian operators, and cell multicomplex representations — with applications to brain network analysis and knowledge graphs."
        start_date: 2024
        end_date: 2026
        highlights:
          - "International collaboration: UFPE (Brazil), University of Amsterdam (Netherlands), Universitas Mercatorum (Rome, Italy)"
          - "PIs: Prof. Stefania Sardellitti (Universitas Mercatorum) and Prof. Fernando A. N. Santos (UvA)"
          - "Funded by the TSP-ARK seed project; visiting researcher periods at UvA and Universitas Mercatorum (Jul.–Oct. 2025)"
          - "Status: finished (Jul.–Oct. 2025)"

      - name: Contributions to Signal Processing with Applications to IoT and Digital Image Representation
        summary: "Advanced graph signal processing theory by introducing new tools for signals defined over graphs, targeting applications in IoT sensor networks and digital image representation. Funded by CNPq (doctoral fellowship) and CAPES (sandwich PhD fellowship at UvA, Nov. 2023 – Jul. 2024)."
        start_date: 2022
        end_date: 2024
        highlights:
          - "PI: Prof. Juliano B. Lima (UFPE)"
          - "Topics: graph signal processing, IoT sensor networks, digital image representation"
          - "Status: finished (Nov. 2023 – Jul. 2024)"

      - name: Monitoring of Therapeutic Exercises and Haemodynamic Parameters for Post-COVID-19 Patients
        summary: "Developed and validated a wearable device for non-invasive monitoring of vital signs (heart rate, SpO2, blood pressure) and therapeutic exercises via accelerometry and imaging, targeting remote rehabilitation of post-hospitalisation COVID-19 patients. Data were processed by a neural network for exercise classification."
        start_date: 2020
        end_date: 2021
        highlights:
          - "PI: Prof. Marco A. B. Rodrigues (UFPE)"
          - "Status: finished (2021)"