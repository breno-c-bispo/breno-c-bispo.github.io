    Projects:
      - name: Processamento de Sinais em Grafos — Contribuições Teóricas e Cenários de Aplicação
        summary: "Desenvolve ferramentas que generalizam conceitos clássicos de processamento de sinais para domínios estruturados em grafos — incluindo redes de sensores, atividade cerebral e imagens digitais — em rede cooperativa envolvendo universidades brasileiras e internacionais."
        start_date: 2024
        end_date: present
        highlights:
          - "Coordenador: Prof. Juliano B. Lima (UFPE)"
          - "Status: em andamento"

      - name: "TSP-ARK — Processamento Topológico de Sinais: Aplicações em Redes Cerebrais e de Conhecimento"
        summary: "Desenvolve arcabouços de processamento topológico de sinais — utilizando Laplacianos de Hodge, operadores cross-Laplacianos e representações em multicomplexos celulares — com aplicações à análise de redes cerebrais e grafos de conhecimento."
        start_date: 2024
        end_date: 2026
        highlights:
          - "Colaboração internacional: UFPE (Brasil), Universidade de Amsterdã (Países Baixos), Universitas Mercatorum (Roma, Itália)"
          - "Coordenadores: Prof.ª Stefania Sardellitti (Universitas Mercatorum) e Prof. Fernando A. N. Santos (UvA)"
          - "Financiado pelo projeto semente TSP-ARK; períodos de visita na UvA e Universitas Mercatorum (jul.–out. 2025)"

      - name: Contribuições ao Processamento de Sinais com Aplicações em IoT e Representação de Imagens Digitais
        summary: "Avançou a teoria de processamento de sinais em grafos introduzindo novas ferramentas para sinais definidos sobre grafos, voltadas a aplicações em redes de sensores IoT e representação de imagens digitais. Financiado pelo CNPq (bolsa de doutorado) e CAPES (bolsa PDSE na UvA, nov. 2023 – jul. 2024)."
        start_date: 2022
        end_date: 2024
        highlights:
          - "Coordenador: Prof. Juliano B. Lima (UFPE)"
          - "Temas: processamento de sinais em grafos, redes de sensores IoT, representação de imagens digitais"

      - name: Monitoramento de Exercícios Terapêuticos e Parâmetros Hemodinâmicos para Pacientes Pós-COVID-19
        summary: "Desenvolveu e validou um dispositivo vestível para monitoramento não invasivo de sinais vitais (frequência cardíaca, SpO2, pressão arterial) e exercícios terapêuticos via acelerometria e imagem, voltado à reabilitação remota de pacientes pós-hospitalização por COVID-19. Os dados foram processados por uma rede neural para classificação de exercícios."
        start_date: 2020
        end_date: 2021
        highlights:
          - "Coordenador: Prof. Marco A. B. Rodrigues (UFPE)"
